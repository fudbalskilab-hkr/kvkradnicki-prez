<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KVK Radnički — Klub menadžer</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bl:#E8000A;    /* crvena primarna */
  --bd:#B50008;    /* tamnija crvena */
  --navy:#0A0A0A;  /* skoro crna */
  --n2:#141414;
  --n3:#1E1E1E;
  --yl:#F5C500;    /* žuta akcentna */
  --wh:#FFFFFF;
  --tx:#EDEDED;
  --mu:#7A7A7A;
  --br:#2A2A2A;
  --gr:#00C46A;
  --rd:#FF6B35;
  --cd:#141414;
}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--tx);height:100vh;display:flex;flex-direction:column;font-size:14px;overflow:hidden}
.osw{font-family:'Oswald',sans-serif}
.tb{background:var(--n2);border-bottom:2px solid var(--bl);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:34px;height:36px;object-fit:contain}
.logof{display:none;width:34px;height:34px;background:var(--bl);border-radius:50%;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;color:#fff}
.logo-t h2{font-size:16px;color:var(--bl);font-family:'Oswald',sans-serif;line-height:1}
.logo-t p{font-size:10px;color:var(--mu)}
.vsw{margin-left:auto;display:flex;gap:3px;background:var(--n3);padding:4px;border-radius:8px}
.vb{padding:5px 14px;border:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--mu);transition:all .15s}
.vb.on{background:var(--bl);color:#fff}
.vb:hover:not(.on){color:var(--tx);background:var(--br)}
.lay{display:flex;flex:1;overflow:hidden}
.sb{width:190px;background:var(--n2);border-right:1px solid var(--br);flex-shrink:0;overflow-y:auto;padding:8px 0}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--mu);font-weight:500;font-size:13px;border-left:3px solid transparent;transition:all .15s}
.ni:hover{color:var(--tx);background:var(--n3)}
.ni.on{color:var(--bl);border-left-color:var(--bl);background:rgba(232,0,10,.08)}
.ni .ic{font-size:14px;width:18px;text-align:center}
.mn{flex:1;overflow-y:auto;padding:18px 22px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.pt{font-size:20px;font-weight:700;color:var(--wh);font-family:'Oswald',sans-serif}
.ps{font-size:12px;color:var(--mu);margin-top:2px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sk{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.sk::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--bl)}
.sk.yl::after{background:var(--yl)}.sk.gr::after{background:var(--gr)}.sk.rd::after{background:var(--rd)}
.sl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px}
.sv_{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:var(--wh);margin:4px 0 2px;line-height:1}
.sm_{font-size:11px;color:var(--mu)}
.si{position:absolute;right:12px;top:12px;font-size:24px;opacity:.1}
.tw{background:var(--cd);border:1px solid var(--br);border-radius:10px;overflow:hidden;margin-bottom:16px}
.th{padding:11px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.tt{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:8px 14px;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--br);background:rgba(255,255,255,.02)}
tbody tr{border-bottom:1px solid var(--br);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--n3)}
tbody td{padding:8px 14px;font-size:13px}
.bd{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bg_{background:rgba(0,196,106,.13);color:var(--gr)}
.br_{background:rgba(255,61,87,.13);color:#FF3D57}
.bb{background:rgba(232,0,10,.13);color:var(--bl)}
.by{background:rgba(245,197,0,.13);color:var(--yl)}
.bm{background:rgba(122,122,122,.13);color:var(--mu)}
.bw{background:rgba(255,255,255,.1);color:var(--wh)}
.btn{padding:7px 14px;border:none;border-radius:7px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--bl);color:#fff}.btn-p:hover{background:var(--bd)}
.btn-o{background:transparent;color:var(--bl);border:1px solid var(--bl)}.btn-o:hover{background:rgba(232,0,10,.1)}
.btn-y{background:var(--yl);color:#111}
.btn-r{background:#FF3D57;color:#fff}
.btn-s{padding:4px 10px;font-size:11px}
.pb{display:inline-block;background:var(--n3);border:1px solid var(--br);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Oswald',sans-serif}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.tc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.tc:hover{border-color:var(--bl)}
.tc-n{font-family:'Oswald',sans-serif;font-size:15px;color:var(--wh)}
.tc-s{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid var(--br);padding-top:10px;margin-top:10px;text-align:center}
.tc-sv{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--wh)}
.tc-sl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.ev{background:var(--cd);border:1px solid var(--br);border-left:4px solid var(--bl);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ev.ut{border-left-color:var(--yl)}
.ev.gym{border-left-color:var(--gr)}
.ev-d{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ev-n{font-family:'Oswald',sans-serif;font-size:15px;margin:2px 0 5px}
.ev-m{font-size:12px;color:var(--mu);display:flex;gap:14px;flex-wrap:wrap}
.av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--bd));display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.ph2{display:flex;align-items:center;gap:16px;margin-bottom:16px;background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:16px}
.smi{display:inline-block;width:50px;height:4px;background:var(--br);border-radius:3px;vertical-align:middle;margin-left:5px;overflow:hidden}
.smf{height:100%;background:var(--bl);border-radius:3px}
.card{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:14px;margin-bottom:14px}
.mc{background:var(--cd);border:1px solid var(--br);border-radius:10px;padding:14px;margin-bottom:12px}
.inp{background:var(--n3);border:1px solid var(--br);border-radius:7px;padding:6px 12px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--bl)}
.divrow{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--br)}
.divrow:last-child{border-bottom:none}
.sep{height:1px;background:var(--br);margin:12px 0}
.mini-stat{background:var(--n3);border-radius:8px;padding:12px;text-align:center}
.mini-stat-v{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--wh)}
.mini-stat-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.portfolio-entry{background:var(--n3);border:1px solid var(--br);border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid var(--bl)}
.portfolio-meta{font-size:11px;color:var(--mu);margin-bottom:5px}
.portfolio-text{font-size:13px;line-height:1.6;color:var(--tx)}
.score-q{display:flex;gap:6px;flex-wrap:wrap}
.score-q span{background:var(--n3);border:1px solid var(--br);border-radius:5px;padding:3px 8px;font-family:'Oswald',sans-serif;font-size:13px}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--n2);border-top:1px solid var(--br);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-inner{display:flex;justify-content:space-around;padding:6px 0}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--mu);font-size:10px;font-weight:600;border:none;background:none;min-width:52px;transition:color .15s}
.bni.on{color:var(--bl)}
.bni .bic{font-size:20px;line-height:1}
.vsw-mob{display:none;background:var(--n3);border-bottom:1px solid var(--br);padding:6px 12px;gap:4px;justify-content:center}
.vsw-mob .vb{flex:1;text-align:center;font-size:12px;padding:5px 6px}

/* RESPONSIVE */
@media(max-width:700px){
  .tb{padding:0 12px;height:48px}
  .logo-t p{display:none}
  .vsw{display:none}
  .vsw-mob{display:flex}
  .lay{flex-direction:column}
  .sb{display:none}
  .mn{padding:12px 12px 80px}
  .bnav{display:block}
  .sg{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .g2{grid-template-columns:1fr;gap:10px}
  .g3{grid-template-columns:1fr 1fr;gap:8px}
  .g4{grid-template-columns:1fr 1fr;gap:8px}
  .tw{overflow-x:auto}
  table{min-width:520px}
  .ph{flex-direction:column;gap:8px;align-items:flex-start}
  .ph2{flex-direction:column;align-items:flex-start;gap:10px}
  .av{width:48px;height:48px;font-size:18px}
  .sk{padding:10px 12px}
  .sv_{font-size:22px}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}
</style>
</head>

function calGrid(){
  const dNames=['Pon','Uto','Sre','Čet','Pet','Sub','Ned'];
  const offset=3; const total=31;
  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div></div>`;
  for(let d=1;d<=total;d++){
    const evs=window.pEv[d]||[];
    const isSel=window.selDay===d;
    const dots=evs.map(e=>`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${e.type==='utakmica'?'var(--yl)':e.type==='gym'?'var(--gr)':'var(--bl)'};margin:1px"></span>`).join('');
    cells+=`<div onclick="selectDay(${d})" style="min-height:52px;padding:6px 4px;border-radius:8px;cursor:pointer;text-align:center;
      background:${isSel?'var(--bl)':evs.length?'var(--n3)':'transparent'};
      border:1px solid ${isSel?'var(--bl)':evs.length?'var(--br)':'transparent'};transition:background .15s">
      <div style="font-size:13px;font-weight:${evs.length?'700':'400'};color:${isSel?'#fff':evs.length?'var(--tx)':'var(--mu)'}">${d}</div>
      <div style="display:flex;justify-content:center;gap:2px;margin-top:4px;flex-wrap:wrap">${dots}</div>
    </div>`;
  }
  const header=dNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:6px 0;text-transform:uppercase;letter-spacing:.5px">${d}</div>`).join('');
  return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:4px 8px 8px">${header}${cells}</div>`;
}

window.addAktivnost=function(d){

  const l=document.getElementById('newLoc')?.value||'Bazen Tašmajdan';

  window.pEv[d].push({type,label:labels[type]+(n?' — '+n:''),time:t,loc:l});

}
window.delEv=function(d,label){
  if(window.pEv[d]) window.pEv[d]=window.pEv[d].filter(e=>e.label!==label);
  if(window.pEv[d]&&!window.pEv[d].length) delete window.pEv[d];
  showSec('planer');
}

function medStatus(p){
  const m=medData[p.id];
  if(!m) return {badge:'bm',label:'Nema podataka'};
  const parts=m.istice.split('.');
  const exp=new Date(+parts[2],+parts[1]-1,+parts[0]);
  const now=new Date(2025,3,29);
  const diff=Math.round((exp-now)/(1000*60*60*24));
  if(diff<0) return {badge:'br_',label:'Istekao!'};
  if(diff<90) return {badge:'by',label:`Ističe za ${diff}d`};
  return {badge:'bg_',label:'Važi'};
}

      <input class="inp" id="povOp" placeholder="Predviđeno trajanje oporavka"/>
      <input class="inp" id="povNap" placeholder="Napomena (opciono)"/>
      <button class="btn btn-p" onclick="addPovreda(${pid})">💾 Sačuvaj</button>
    </div>
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

window.addPovreda=function(pid){
  if(!medData[pid]) medData[pid]={pregled:'—',istice:'—',povrede:[]};
  const vrsta=document.getElementById('povVrsta')?.value?.trim();
  const op=document.getElementById('povOp')?.value?.trim();
  const nap=document.getElementById('povNap')?.value?.trim();
  if(!vrsta){alert('Unesite vrstu povrede!');return;}
  const today=new Date();
  const d=`${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
  medData[pid].povrede.push({datum:d,vrsta,oporavak:op||'—',napomena:nap||''});
  openMedDetail(pid);
}

function renderObavestenja(){
  const obs=window.obavestenja;
  return `<div class="ph"><div><div class="pt">Obaveštenja</div><div class="ps">Oglasna tabla kluba</div></div></div>
  <div class="card" style="margin-bottom:16px">
    <div style="font-family:'Oswald',sans-serif;font-size:14px;margin-bottom:10px;color:var(--yl)">📢 Novo obaveštenje</div>
    <textarea class="inp" id="obTekst" rows="3" placeholder="Napišite obaveštenje za ceo klub..." style="resize:vertical;height:80px"></textarea>
    <button class="btn btn-p" style="margin-top:8px;width:100%" onclick="addObavestenje()">Objavi</button>
  </div>
  ${obs.map(o=>`
    <div class="card" style="margin-bottom:10px;border-left:4px solid ${o.pin?'var(--yl)':'var(--br)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <span style="font-weight:700;font-size:13px">${o.autor}</span>
          <span class="bd bm" style="margin-left:6px;font-size:10px">${o.rola}</span>
          ${o.pin?'<span class="bd by" style="margin-left:4px;font-size:10px">📌 Istaknuto</span>':''}
        </div>
        <span style="font-size:11px;color:var(--mu)">${o.datum}</span>
      </div>
      <div style="font-size:13px;line-height:1.6;color:var(--tx)">${o.tekst}</div>
    </div>`).join('')}`;
}

window.addObavestenje=function(){
  const tekst=document.getElementById('obTekst')?.value?.trim();
  if(!tekst){alert('Unesite tekst!');return;}
  const today=new Date();
  const d=`${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
  window.obavestenja.unshift({id:window.nextObId++,autor:'Nikola Petrović',rola:'Trener',datum:d,tekst,pin:false});
  showSec('obavestenja');
}

sv('predsednik');
</script>
</body>
</html>
